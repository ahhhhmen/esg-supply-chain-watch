name: Global ESG Daily Monitor (Daily)

# 配置触发时机
on:
  schedule:
    # 每天 UTC 时间 23:45 自动运行（对应北京时间早上 07:45，避开高峰期）
    - cron: '45 23 * * *'
  workflow_dispatch:
    # 允许在 GitHub 网页端手动点击运行按钮

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    # 1. 检出仓库代码
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. 部署 Python 3.10 环境
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 安装依赖
    - name: Install Engineering Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml requests beautifulsoup4 openai pandas

    # 4. 执行每日舆情情报检索（--mode daily）
    - name: Execute ESG Intelligence Agent (Daily)
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python esg_intelligence_agent.py --mode daily

    # 5. 自动化成果回传（将新生成的 Markdown 报告推回仓库）
    - name: Commit and Push Daily Intelligence Report
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查报告文件是否有更新
        if [ -f "esg_global_report.md" ]; then
          git add esg_global_report.md
          git diff-index --quiet HEAD || git commit -m "🤖 每日自动更新: 舆情简报 ($(date +'%Y-%m-%d %H:%M'))"
          git push
        else
          echo "警告：未检测到生成的报告文件。"
        fi