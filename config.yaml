# ==========================================
# 全球 ESG 与供应链合规监控智能体 配置文件 v9
# 架构：地缘多语种通用轨 + 高风险机构定向轨 + 双频动态播报
# ==========================================

# 1. 核心监控企业名单
companies:
  - name_zh: "华友钴业"
    name_en: "Huayou Cobalt"
    ticker: "603799.SS"
  - name_zh: "洛阳钼业"
    name_en: "CMOC"
    ticker: "603993.SS"
  - name_zh: "赣锋锂业"
    name_en: "Ganfeng Lithium"
    ticker: "002460.SZ"
  - name_zh: "中伟股份"
    name_en: "CNGR"
    ticker: "300919.SZ"
  - name_zh: "格林美"
    name_en: "GEM"
    ticker: "002340.SZ"
  - name_zh: "宁德时代"
    name_en: "CATL"
    ticker: "300750.SZ"

# 2. 三大抓取轨道配置
intelligence_tracks:

  # ── 轨道 1：地缘多语种通用新闻网 ───────────────────────
  # 消除 GitHub 云端美国 IP 的地理隔离，以当地 hl/gl/ceid 参数定向抓取
  geographical_tracks:
    - lang: "zh-CN"
      lang_label: "中文"
      url_template: "https://news.google.com/rss/search?q={query}&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
    - lang: "en-US"
      lang_label: "English"
      url_template: "https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
    - lang: "id-ID"
      lang_label: "Bahasa Indonesia"
      url_template: "https://news.google.com/rss/search?q={query}&hl=id&gl=ID&ceid=ID:id"
    - lang: "fr-FR"
      lang_label: "Français"
      url_template: "https://news.google.com/rss/search?q={query}&hl=fr&gl=FR&ceid=FR:fr"

  # ── 轨道 2：定向高风险机构预警 ─────────────────────────
  # 针对特定企业在商业与人权资源中心 (BHRRC) 的黑历史记录
  premium_company_tracks:
    - source: "BHRRC"
      company_name_field: "name_en"
      url_template: 'https://news.google.com/rss/search?q="{company_name}"+site:business-humanrights.org&hl=en-US&gl=US&ceid=US:en'
      track_label: "BHRRC 人权预警"

  # ── 轨道 3：全球宏观合规政策前沿 ─────────────────────
  # 独立于企业，每周全局抓取一次欧盟准则动态 (EFRAG/CSRD/CSDDD/ESRS)
  premium_global_tracks:
    - source: "EFRAG"
      url: "https://news.google.com/rss/search?q=site:efrag.org+(CSRD+OR+ESRS+OR+CSDDD)&hl=en-US&gl=US&ceid=US:en"
      track_label: "欧盟合规前沿"

# 3. 双频主题矩阵（多语种关键词）
topics:

  # ── 日常主题 (Daily)：舆情高频风险 ────────────────────
  daily:
    - category: "劳工权益与罢工"
      keywords:
        zh-CN: ["罢工", "劳工权益", "劳动争议", "抗议", "工会", "强迫劳动", "劳资纠纷"]
        en-US: ["strike", "labor rights", "worker protest", "union dispute", "forced labor", "wage dispute", "collective bargaining"]
        id-ID: ["mogok kerja", "hak buruh", "unjuk rasa", "serikat pekerja", "sengketa tenaga kerja", "kerja paksa"]
        fr-FR: ["grève", "droits des travailleurs", "syndicat", "manifestation", "travail forcé", "conflit social"]

    - category: "环境污染与安全事故"
      keywords:
        zh-CN: ["污染", "泄漏", "环境事故", "废水", "尾矿", "爆炸", "安全事故", "环保处罚", "有毒物质"]
        en-US: ["pollution", "spill", "environmental accident", "toxic waste", "tailings", "explosion", "safety incident", "EPA fine", "hazardous material"]
        id-ID: ["polusi", "tumpahan", "kecelakaan lingkungan", "limbah beracun", "ledakan", "kecelakaan kerja", "bahan berbahaya"]
        fr-FR: ["pollution", "déversement", "accident environnemental", "déchets toxiques", "explosion", "sécurité au travail", "substance dangereuse"]

    - category: "社区冲突与土地纠纷"
      keywords:
        zh-CN: ["社区抗议", "征地纠纷", "拆迁", "居民投诉", "土著权利", "安置补偿"]
        en-US: ["community protest", "land dispute", "resettlement", "indigenous rights", "compensation", "local opposition"]
        id-ID: ["protes masyarakat", "sengketa tanah", "penggusuran", "hak adat", "kompensasi"]
        fr-FR: ["protestation communautaire", "conflit foncier", "expulsion", "droits autochtones", "compensation"]

  # ── 周报主题 (Weekly)：三大地缘合规维度 ──────────────
  weekly:
    - category: "欧盟准入壁垒"
      keywords:
        zh-CN: ["欧盟电池法案", "电池护照", "关键原材料法", "CRMA", "CSRD", "CSDDD", "碳边境调节", "CBAM", "供应链尽职调查", "欧盟新电池法规"]
        en-US: ["EU Battery Regulation", "Battery Passport", "Critical Raw Materials Act", "CRMA", "CSRD", "CSDDD", "CBAM", "supply chain due diligence", "EU Battery Directive"]
        id-ID: ["Regulasi Baterai UE", "Paspor Baterai", "CRMA", "CSRD", "CBAM", "uji tuntas rantai pasok", "Uni Eropa baterai"]
        fr-FR: ["Règlement Batterie UE", "Passeport Batterie", "CRMA", "CSRD", "CSDDD", "CBAM", "devoir de vigilance", "code minier", "directive batteries"]

    - category: "美国地缘封锁"
      keywords:
        zh-CN: ["通胀削减法案", "IRA", "FEOC", "外国敏感实体", "涉疆法案", "UFLPA", "实体清单", "出口管制", "BIS"]
        en-US: ["Inflation Reduction Act", "FEOC", "Foreign Entity of Concern", "UFLPA", "entity list", "export control", "IRA tax credit", "BIS"]
        id-ID: ["Inflation Reduction Act", "FEOC", "Undang-Undang Pengurangan Inflasi", "daftar entitas", "kontrol ekspor"]
        fr-FR: ["Inflation Reduction Act", "FEOC", "entité étrangère préoccupante", "liste d'entités", "contrôle des exportations", "restrictions commerciales"]

    - category: "资源国民族主义"
      keywords:
        zh-CN: ["下游化", "原矿出口禁令", "本地化加工", "资源民族主义", "矿产主权", "禁止原矿出口"]
        en-US: ["downstreaming", "raw ore export ban", "Hilirisasi", "local processing mandate", "resource nationalism", "mining sovereignty", "mineral export ban"]
        id-ID: ["hilirisasi", "larangan ekspor bijih mentah", "nasionalisme sumber daya", "kedaulatan mineral", "pengolahan lokal"]
        fr-FR: ["transformation locale", "interdiction d'exportation de minerai brut", "nationalisme des ressources", "souveraineté minière", "code minier", "minerai brut"]

# 4. 系统运行控制参数
days_limit: 14