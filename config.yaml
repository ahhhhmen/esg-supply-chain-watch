# 2. 三大抓取轨道配置
intelligence_tracks:

  # ── 轨道 1：地缘多语种通用新闻网 ───────────────────────
  # 消除 GitHub 云端美国 IP 的地理隔离，以当地 hl/gl/ceid 参数定向抓取
  geographical_tracks:
    - lang: "zh-CN"
      lang_label: "中文"
      url_template: "https://news.google.com/rss/search?q={query}&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
    - lang: "en-US"
      lang_label: "English"
      url_template: "https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
    - lang: "id-ID"
      lang_label: "Bahasa Indonesia"
      url_template: "https://news.google.com/rss/search?q={query}&hl=id&gl=ID&ceid=ID:id"
    - lang: "fr-FR"
      lang_label: "Français"
      url_template: "https://news.google.com/rss/search?q={query}&hl=fr&gl=FR&ceid=FR:fr"
    - lang: "ru"
      lang_label: "Русский"
      url_template: "https://news.google.com/rss/search?q={query}&hl=ru&gl=RU&ceid=RU:ru"

  # ── 轨道 2：定向高风险机构预警 ─────────────────────────
  # 针对特定企业在商业与人权资源中心 (BHRRC) 的黑历史记录
  premium_company_tracks:
    - source: "BHRRC"
      company_name_field: "name_en"
      url_template: 'https://news.google.com/rss/search?q="{company_name}"+site:business-humanrights.org&hl=en-US&gl=US&ceid=US:en'
      track_label: "BHRRC 人权预警"

  # ── 轨道 3：全球宏观合规政策前沿 ─────────────────────
  # 独立于企业，每周全局抓取一次欧盟准则动态 (EFRAG/CSRD/CSDDD/ESRS)
  premium_global_tracks:
    - source: "EFRAG"
      url: "https://news.google.com/rss/search?q=site:efrag.org+(CSRD+OR+ESRS+OR+CSDDD)&hl=en-US&gl=US&ceid=US:en"
      track_label: "欧盟合规前沿"

# 3. 双频主题矩阵（多语种关键词）
topics:

  # ── 日常主题 (Daily)：舆情高频风险 ────────────────────
  daily:
    - category: "劳工权益与罢工"
      keywords:
        zh-CN: ["罢工", "劳工权益", "劳动争议", "抗议", "工会", "强迫劳动", "劳资纠纷"]
        en-US: ["strike", "labor rights", "worker protest", "union dispute", "forced labor", "wage dispute", "collective bargaining"]
        id-ID: ["mogok kerja", "hak buruh", "unjuk rasa", "serikat pekerja", "sengketa tenaga kerja", "kerja paksa", "jam kerja panjang", "keselamatan kerja", "kesehatan kerja", "mati mendadak", "bunuh diri"]
        fr-FR: ["grève", "droits des travailleurs", "syndicat", "manifestation", "travail forcé", "conflit social"]
        ru: ["забастовка", "права трудящихся", "протест", "профсоюз", "принудительный труд", "трудовой спор", "длинный рабочий день", "несчастный случай", "внезапная смерть", "самоубийство"]

    - category: "环境污染与安全事故"
