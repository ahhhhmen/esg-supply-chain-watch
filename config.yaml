# 4. 系统运行控制参数
days_limit: 7

# 5. 查询排除词（自动拼接到每个查询末尾，减少财经/产品噪声）
# risk 模式：激进排除财经/产品噪声
query_exclusions_risk: "-stock -shares -profit -revenue -IPO -dividend -Surge -Plunge -Intraday -rally -launch -review -unveil -roadster -football -baseball -cricket -sport -debut -specification -\"stock price\" -\"day high\""
# practice 模式：仅排除财经噪声，保留 launch/review 等实践信号
query_exclusions_practice: "-stock -shares -profit -revenue -IPO -dividend -Surge -Plunge -Intraday -rally -roadster -football -baseball -cricket -sport -\"stock price\" -\"day high\""

