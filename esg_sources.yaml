version: "12.3_esg_matrix"
esg_sources:
  # 轨道1：动态天网 - 重点企业与高危地区组合监控
  - id: "radar_byd_europe"
    type: "google_news_rss"
    query: '("BYD" OR "CATL") AND ("Hungary" OR "Germany") AND ("probe" OR "labor" OR "environment" OR "strike")'
    time_window: "24h"
    enabled: true

  # 轨道2：动态天网 - 华友自身及核心上游矿区监控
  - id: "radar_huayou_africa"
    type: "google_news_rss"
    query: '"Huayou Cobalt" AND ("Zimbabwe" OR "DRC" OR "Ghana") AND ("halt" OR "accident" OR "protest" OR "ban")'
    time_window: "24h"
    enabled: true

  # 轨道3：BHRRC 人权预警（Google News RSS — 原 HTML 靶向因 Cloudflare 403 已替换）
  - id: "target_bhrrc_latest"
    type: "google_news_rss"
    query: 'site:business-humanrights.org AND ("mining" OR "cobalt" OR "lithium" OR "nickel" OR "battery" OR "labor rights")'
    time_window: "7d"
    enabled: true

  # 轨道4：新增关键矿产巨头监控（紫金矿业等）
  - id: "radar_zijin_global"
    type: "google_news_rss"
    query: '"Zijin" AND ("CBP" OR "WRO" OR "forced labor" OR "strike" OR "environment" OR "halt")'
    time_window: "24h"
    enabled: true

  # 轨道5：美国海关 WRO/强迫劳动泛抓取（不限特定企业，紧盯矿产/电池）
  - id: "radar_us_customs_wro"
    type: "google_news_rss"
    query: '("Withhold Release Order" OR "CBP" OR "UFLPA") AND ("copper" OR "cobalt" OR "lithium" OR "battery" OR "solar")'
    time_window: "24h"
    enabled: true

  # 轨道6：印尼 HPAL 湿法尾矿坝与园区安全重点监控
  - id: "radar_indonesia_nickel_hpal"
    type: "google_news_rss"
    query: '("Huayue" OR "Huafei" OR "IWIP" OR "IMIP") AND ("tailings" OR "collapse" OR "spill" OR "dam" OR "maintenance" OR "coal plant" OR "indigenous")'
    time_window: "7d"
    enabled: true

  # 轨道7：Climate Rights International (CRI) 专项人权与气候合规预警
  - id: "target_cri_reports"
    type: "google_news_rss"
    query: '("Climate Rights International" OR "site:cri.org") AND ("Indonesia" OR "nickel" OR "Weda Bay" OR "Morowali")'
    time_window: "7d"
    enabled: true