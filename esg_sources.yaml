version: "12.2_esg_matrix"
esg_sources:
  # 轨道1：动态天网 - 重点企业与高危地区组合监控
  - id: "radar_byd_europe"
    type: "google_news_rss"
    query: '("BYD" OR "CATL") AND ("Hungary" OR "Germany") AND ("probe" OR "labor" OR "environment" OR "strike")'
    time_window: "7d"
    enabled: true

  # 轨道2：动态天网 - 华友自身及核心上游矿区监控
  - id: "radar_huayou_africa"
    type: "google_news_rss"
    query: '"Huayou Cobalt" AND ("Zimbabwe" OR "DRC" OR "Ghana") AND ("halt" OR "accident" OR "protest" OR "ban")'
    time_window: "7d"
    enabled: true

  # 轨道3：静态 HTML 靶向 - 核心 NGO
  - id: "target_bhrrc_latest"
    type: "html"
    url: "[https://www.business-humanrights.org/en/latest-news/](https://www.business-humanrights.org/en/latest-news/)"
    dom_selector: "div.latest-news-list"
    enabled: true